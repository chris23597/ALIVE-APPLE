name: Build ALIVE APPLE for iPhone 16

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (FREE macOS runner)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          echo "Generated project:"
          ls -la *.xcodeproj

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
            -project "ALIVE APPLE.xcodeproj" \
            -scheme "ALIVE APPLE" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/output.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SWIFT_STRICT_CONCURRENCY=minimal

      - name: Debug archive structure
        run: |
          echo "=== Archive structure ==="
          find ./build/output.xcarchive -maxdepth 5 -type f -o -type d | head -40

      - name: Package as IPA
        run: |
          echo "Looking for .app bundle..."
          APP=$(find ./build/output.xcarchive -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found in archive"
            echo "Full archive contents:"
            find ./build/output.xcarchive -type f | head -20
            exit 1
          fi
          echo "Found: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r ALIVE_APPLE.ipa Payload
          rm -rf Payload
          ls -lh ALIVE_APPLE.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ALIVE_APPLE_iPhone16
          path: ALIVE_APPLE.ipa
          retention-days: 90

      - name: Build Summary
        run: |
          echo "========================================="
          echo "  ALIVE APPLE — Build Complete!"
          echo "========================================="
          echo ""
          echo "  Download IPA from Artifacts above."
          echo "  Install AltStore on iPhone → sideload IPA."
