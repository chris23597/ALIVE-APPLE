name: Build ALIVE APPLE for iPhone 16

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (FREE macOS runner)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: Do not use case-sensitive `grep ios` — SDK lines say "iOS" / "iphoneos".
      # A failing grep exits 1 under bash -e and aborts the job before the real build.
      - name: Select Xcode and show versions
        run: |
          set -uo pipefail
          echo "=== /Applications Xcode apps ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || ls /Applications | head -40

          SELECTED=""
          if [ -d /Applications/Xcode.app/Contents/Developer ]; then
            SELECTED=/Applications/Xcode.app/Contents/Developer
          else
            # Prefer highest versioned Xcode_*.app on the runner image
            CAND=$(ls -d /Applications/Xcode_*.app/Contents/Developer 2>/dev/null | sort -V | tail -1 || true)
            if [ -n "$CAND" ]; then
              SELECTED="$CAND"
            fi
          fi

          if [ -n "$SELECTED" ]; then
            echo "Selecting: $SELECTED"
            sudo xcode-select -s "$SELECTED"
          else
            echo "WARN: no Xcode.app tree found; using current xcode-select path"
          fi

          echo "DEVELOPER_DIR=$(xcode-select -p)"
          xcodebuild -version
          swift --version
          echo "=== iOS SDKs ==="
          xcodebuild -showsdks 2>/dev/null | grep -i iphone || echo "(no iphone SDK lines listed)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          echo "Generated project:"
          ls -la *.xcodeproj

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve SPM dependencies
        run: |
          set -uo pipefail
          xcodebuild \
            -project "ALIVE APPLE.xcodeproj" \
            -scheme "ALIVE APPLE" \
            -sdk iphoneos \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath .build \
            -disablePackageRepositoryCache \
            SWIFT_STRICT_CONCURRENCY=minimal 2>&1 | tee /tmp/spm-resolve.log | tail -80
          # Do not fail the job only because tail closed the pipe early
          if grep -qiE 'error:|failed|Could not resolve' /tmp/spm-resolve.log; then
            echo "SPM resolve reported errors — continuing to archive (may still build if cached)"
          fi

      - name: Build archive (unsigned)
        run: |
          set -uo pipefail
          mkdir -p ./build
          set +e
          xcodebuild \
            -project "ALIVE APPLE.xcodeproj" \
            -scheme "ALIVE APPLE" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/output.xcarchive \
            -clonedSourcePackagesDirPath .build \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO 2>&1 | tee /tmp/xcodebuild-archive.log
          XC=${PIPESTATUS[0]}
          set -e
          echo "xcodebuild exit=$XC"
          tail -120 /tmp/xcodebuild-archive.log
          # Surface compile errors clearly
          grep -E 'error:|fatal error:|BUILD FAILED' /tmp/xcodebuild-archive.log | tail -40 || true
          exit $XC

      - name: Debug archive structure
        if: success()
        run: |
          echo "=== Archive structure ==="
          find ./build/output.xcarchive -maxdepth 5 -type f -o -type d | head -40

      - name: Package as IPA
        if: success()
        run: |
          APP=$(find ./build/output.xcarchive -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found in archive"
            find ./build/output.xcarchive -type f | head -20
            exit 1
          fi
          echo "Found: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r ALIVE_APPLE.ipa Payload
          rm -rf Payload
          ls -lh ALIVE_APPLE.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ALIVE_APPLE_iPhone16
          path: ALIVE_APPLE.ipa
          retention-days: 90

      - name: Build Summary
        if: always()
        run: |
          echo "========================================="
          echo "  ALIVE APPLE - CI job finished"
          echo "========================================="
          echo "  Download IPA from Artifacts if build succeeded."
          echo "  Install with AltStore / Sideloadly on iPhone."
